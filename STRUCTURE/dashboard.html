<!DOCTYPE html>
<html>
<head>
<title>MindGuard Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="dashboard">

<h1>MindGuard</h1>
<p>Welcome {{name}}. Monitor and improve your mental well-being.</p>

<div class="card">
  <h2>Weekly Mood Overview</h2>
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <h2>Self Assessment</h2>
  <p>Evaluate your mental health using a structured questionnaire.</p>
  <a href="/questionnaire"><button>Start Assessment</button></a>
</div>

<div class="card">
  <h2>AI Support Assistant</h2>

  <div id="chatBox" class="chat-box"></div>

  <input type="text" id="userInput" placeholder="Describe how you are feeling...">
  <button onclick="sendMessage()">Send</button>
</div>

</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
