<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MindGuard | Clinical Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand: {{ color }}; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin: 0; padding: 40px 20px; color: #1e293b; }
        .card { max-width: 800px; margin: 0 auto; background: white; border-radius: 30px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); }
        
        .header { background: var(--brand); padding: 60px; text-align: center; color: white; }
        .score-val { font-size: 110px; font-weight: 800; margin: 0; line-height: 1; letter-spacing: -4px; }
        .tag { background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 50px; font-weight: 700; text-transform: uppercase; font-size: 12px; margin-bottom: 20px; display: inline-block; }

        .content { padding: 50px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin: 30px 0; }
        .metric { background: #f8fafc; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; }
        .metric h4 { margin: 0 0 10px 0; color: #64748b; font-size: 12px; text-transform: uppercase; }
        
        .bar { background: #e2e8f0; height: 8px; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .fill { background: var(--brand); height: 100%; border-radius: 10px; }

        .advice-section { background: #f8fafc; border-left: 6px solid var(--brand); padding: 30px; border-radius: 0 20px 20px 0; margin-top: 30px; }
        .btn { display: block; width: 100%; padding: 20px; background: #0f172a; color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="tag">{{ status }}</div>
            <h1 class="score-val">{{ score }}%</h1>
            <p style="font-weight: 600; opacity: 0.9;">Overall Resilience Capacity</p>
        </div>
        <div class="content">
            <h3 style="margin-top: 0;">Metric Breakdown</h3>
            <div class="grid">
                <div class="metric">
                    <h4>Biological</h4>
                    <div style="font-size: 28px; font-weight: 800;">{{ bio }}%</div>
                    <div class="bar"><div class="fill" style="width: {{ bio }}%"></div></div>
                </div>
                <div class="metric">
                    <h4>Cognitive</h4>
                    <div style="font-size: 28px; font-weight: 800;">{{ cog }}%</div>
                    <div class="bar"><div class="fill" style="width: {{ cog }}%"></div></div>
                </div>
                <div class="metric">
                    <h4>Emotional</h4>
                    <div style="font-size: 28px; font-weight: 800;">{{ emo }}%</div>
                    <div class="bar"><div class="fill" style="width: {{ emo }}%"></div></div>
                </div>
            </div>

            <div class="advice-section">
                <h4 style="margin: 0 0 10px 0; color: var(--brand);">Primary Focus: {{ focus }} Recovery</h4>
                <p style="margin: 0; font-weight: 600; line-height: 1.6; color: #475569;">{{ advice }}</p>
            </div>

            <button onclick="window.print()" class="btn">DOWNLOAD SECURE REPORT (PDF)</button>
        </div>
    </div>
</body>
</html>
